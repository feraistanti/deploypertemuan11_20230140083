spring.application.name=pertemuan11

# KONFIGURASI DATABASE
# URL ini digunakan saat Anda menjalankan aplikasi di luar Docker (di Windows)
# Saat di dalam Docker, Spring Boot akan menimpa URL ini dengan environment variable di atas
spring.datasource.url=jdbc:mysql://localhost:3308/pertemuan11_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=springuser
spring.datasource.password=password123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# KONFIGURASI JPA
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# HIKARI CONNECTION POOL
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.connection-timeout=30000

# LOGGING
logging.level.org.hibernate.SQL=DEBUG